<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#151c20">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Bar Hanabi">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Bar Hanabi">
    <title>Bar Hanabi</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/app-icon-180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/app-icon-192.png">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="setup" id="setupView">
        <div class="setup-title">
          <h1>Bar Hanabi</h1>
        </div>

        <div class="setup-actions">
          <div class="setup-settings" aria-label="Game settings">
            <label class="setup-setting" for="hintSetting">
              <span>Hints</span>
              <select id="hintSetting" name="hints">
                <option value="8" selected>8</option>
                <option value="7">7</option>
                <option value="6">6</option>
                <option value="5">5</option>
                <option value="4">4</option>
                <option value="3">3</option>
                <option value="2">2</option>
                <option value="1">1</option>
              </select>
            </label>
            <label class="setup-setting" for="bombSetting">
              <span>Bombs</span>
              <select id="bombSetting" name="bombs">
                <option value="3" selected>3</option>
                <option value="2">2</option>
                <option value="1">1</option>
                <option value="0">0</option>
              </select>
            </label>
            <label class="setup-toggle" for="rainbowSetting">
              <input id="rainbowSetting" name="rainbow" type="checkbox" checked>
              <span>Rainbow</span>
            </label>
          </div>
          <button class="primary-button" id="createRoomButton" type="button">Create Game</button>
          <form class="join-form" id="joinForm">
            <div class="join-row">
              <input id="roomCodeInput" name="room" autocomplete="off" inputmode="latin" maxlength="4" aria-label="Game Code" placeholder="Game Code">
              <button type="submit">Join</button>
            </div>
          </form>
        </div>
      </section>

      <section class="game hidden" id="gameView">
        <header class="top-bar">
          <div class="top-title">
            <button class="room-code-button" id="roomCodeLabel" type="button" aria-label="Copy room link" title="Copy room link"></button>
          </div>
          <strong
            class="turn-title"
            id="turnStatus"
            role="button"
            tabindex="0"
            aria-label="Double tap to switch player"
            title="Double tap to switch player"
          >Their Turn</strong>
          <div class="top-actions">
            <button
              class="settings-button"
              type="button"
              id="settingsButton"
              aria-label="Settings"
              aria-controls="settingsPopover"
              aria-expanded="false"
              title="Settings"
            >
              <svg class="settings-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.18.6.74 1 1.36 1H21a2 2 0 1 1 0 4h-.24a1.65 1.65 0 0 0-1.36 1Z"></path>
              </svg>
            </button>
          </div>
        </header>

        <section class="player-area opponent-area">
          <div class="clue-label" id="opponentClueLabel" hidden></div>
          <button class="hand-flip-button hidden" id="opponentFlipButton" type="button" aria-label="Flip opponent hand replay view">Flip</button>
          <div class="hand-surface opponent-hand" id="opponentHand" aria-label="Visible hand"></div>
        </section>

        <section class="table-state">
          <section class="score-strip" aria-label="Game state">
            <button
              class="deck-tile"
              id="deckTile"
              type="button"
              aria-label="Deck"
              aria-controls="deckReveal"
              aria-expanded="false"
              aria-haspopup="dialog"
              disabled
            >
              <span>Deck</span>
              <strong id="deckCount">0</strong>
            </button>
            <div>
              <span>Hints</span>
              <strong id="hintCount">8</strong>
            </div>
            <div>
              <span>Bombs</span>
              <strong id="bombCount">0</strong>
            </div>
          </section>

          <section class="fireworks" id="fireworks" aria-label="Fireworks"></section>

          <section class="discard-row" aria-label="Discard pile">
            <div class="discard-buckets">
              <div class="discard-bucket">
                <div class="mini-cards" id="neededDiscardPile" aria-label="Needed discards"></div>
              </div>
              <div class="discard-bucket">
                <div class="mini-cards" id="spentDiscardPile" aria-label="Safe discards"></div>
              </div>
            </div>
          </section>
        </section>

        <section class="player-area self-area">
          <div class="clue-label" id="selfClueLabel" hidden></div>
          <button class="hand-flip-button hidden" id="selfFlipButton" type="button" aria-label="Flip own hand replay view">Flip</button>
          <div class="hand-surface self-hand" id="selfHand" aria-label="Hidden hand"></div>
        </section>

        <div class="area-actions self-controls">
          <button type="button" id="selfPlayButton">Play</button>
          <button type="button" id="selfDiscardButton">Discard</button>
          <button type="button" id="clueButton">Clue</button>
          <div class="rotation-wheel hidden" id="rotationWheel" aria-label="Rotate selected card" title="Rotate selected card">
            <div class="rotation-wheel-track" aria-hidden="true">
              <div class="rotation-wheel-spoke"></div>
              <div class="rotation-wheel-knob"></div>
            </div>
          </div>

          <section class="replay-panel hidden" id="replayPanel" aria-label="Replay controls">
            <button type="button" id="replayPreviousButton" aria-label="Previous replay event">Prev</button>
            <input id="replayTimeline" type="range" min="0" max="0" value="0" aria-label="Replay timeline">
            <button type="button" id="replayNextButton" aria-label="Next replay event">Next</button>
            <button type="button" id="replayCsvButton" aria-label="Download replay CSV">CSV</button>
          </section>
        </div>
      </section>

      <div class="clue-chooser hidden" id="clueChooser" role="dialog" aria-modal="true" aria-labelledby="clueChooserTitle">
        <div class="clue-chooser-panel">
          <h2 id="clueChooserTitle">Choose clue</h2>
          <div class="clue-chooser-options" id="clueChooserOptions"></div>
          <button class="clue-chooser-cancel" type="button" id="clueChooserCancel">Cancel</button>
        </div>
      </div>

      <div class="deck-reveal hidden" id="deckReveal" role="dialog" aria-modal="true" aria-labelledby="deckRevealTitle" aria-hidden="true">
        <div class="deck-reveal-panel">
          <div class="settings-popover-header deck-reveal-header">
            <div class="deck-reveal-title">
              <h2 id="deckRevealTitle">Remaining Deck</h2>
              <p id="deckRevealCount">0 cards</p>
            </div>
            <button class="settings-close-button" type="button" id="deckRevealCloseButton" aria-label="Close deck" title="Close deck"></button>
          </div>
          <div class="deck-reveal-grid mini-cards" id="deckRevealGrid" aria-label="Remaining deck cards"></div>
        </div>
      </div>

      <div class="settings-popover hidden" id="settingsPopover" role="dialog" aria-modal="true" aria-labelledby="settingsPopoverTitle" aria-hidden="true">
        <div class="settings-popover-panel">
          <div class="settings-popover-header">
            <h2 id="settingsPopoverTitle">Settings</h2>
            <button class="settings-close-button" type="button" id="settingsCloseButton" aria-label="Close settings" title="Close settings"></button>
          </div>
          <div class="settings-controls">
            <button class="settings-action-button" type="button" id="resetButton">Restart</button>
            <button class="settings-action-button danger-outline" type="button" id="forfeitButton">Forfeit</button>
            <label class="settings-toggle" for="autoCluePreviewToggle" title="Auto-send a clue when there is only one valid option">
              <span>Auto Clue</span>
              <input id="autoCluePreviewToggle" type="checkbox" aria-label="Auto clue">
              <span class="settings-toggle-track" aria-hidden="true">
                <span class="settings-toggle-thumb"></span>
              </span>
            </label>
            <label class="settings-toggle" for="manualRotationToggle">
              <span>Manual Rotation</span>
              <input id="manualRotationToggle" type="checkbox" aria-label="Manual rotation">
              <span class="settings-toggle-track" aria-hidden="true">
                <span class="settings-toggle-thumb"></span>
              </span>
            </label>
            <label class="settings-toggle replay-setting hidden" id="replayLayoutStepsSetting" for="replayLayoutStepsToggle">
              <span>Replay Layout Steps</span>
              <input id="replayLayoutStepsToggle" type="checkbox" aria-label="Replay layout steps">
              <span class="settings-toggle-track" aria-hidden="true">
                <span class="settings-toggle-thumb"></span>
              </span>
            </label>
          </div>
        </div>
      </div>

      <div class="toast hidden" id="toast" role="status" aria-live="polite"></div>
    </main>

    <script>
      (() => {
        const appVersion = new URLSearchParams(window.location.search).get("v");
        const appScript = document.createElement("script");
        appScript.src = appVersion ? `/app.js?v=${encodeURIComponent(appVersion)}` : "/app.js";
        document.body.append(appScript);
      })();
    </script>
  </body>
</html>
